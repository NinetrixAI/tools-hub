name: gh
version: 1.0.0
description: "GitHub CLI — repos, issues, PRs, releases, Actions, gists, and raw API access"
author: ninetrix
tags:
- developer
- git
- github
- ci-cd
verified: true

skill_set:
  - hub://gh-master@1.0.0

source:
  type: cli

dependencies:
  apt_repo:
    keyring_url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    repo: "deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
  apt: [gh]

credentials:
  GH_TOKEN:
    label: GitHub personal access token (used by gh CLI for auth)
    required: true

credential_aliases:
  GITHUB_TOKEN: GH_TOKEN
