name: gh
version: 1.0.0
description: "GitHub CLI — repos, issues, PRs, releases, Actions, gists, and raw API access"
author: ninetrix
tags:
- developer
- git
- github
- ci-cd
verified: true

skill_set:
  - hub://gh-master@1.0.0

source:
  type: cli
  install: "apt-get update && apt-get install -y curl && curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /usr/share/keyrings/gh.gpg && echo 'deb [signed-by=/usr/share/keyrings/gh.gpg] https://cli.github.com/packages stable main' > /etc/apt/sources.list.d/gh.list && apt-get update && apt-get install -y gh"

credentials:
  GITHUB_TOKEN:
    label: GitHub personal access token (used by gh for auth)
    required: true
