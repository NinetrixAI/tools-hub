name: gh
version: 1.0.0
description: "GitHub CLI — repos, issues, PRs, releases, Actions, gists, and raw API access"
author: ninetrix
tags:
- developer
- git
- github
- ci-cd
verified: true

skill_set:
  - hub://gh-master@1.0.0

source:
  type: cli
  install: "mkdir -p -m 755 /etc/apt/keyrings && wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null && chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg && echo \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null && apt-get update && apt-get install -y gh"

credentials:
  GITHUB_TOKEN:
    label: GitHub personal access token (used by gh for auth)
    required: true
